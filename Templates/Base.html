<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ventes GAB</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-3">
        <div class="container">
            <a class="navbar-brand" href="/">Ventes 🇬🇦</a>
            {% if user.is_authenticated %}
                <div class="d-flex align-items-center">
                    <span class="text-white me-2">{{ user.username }}</span>
                    <a href="{% url 'exit' %}" class="btn btn-sm btn-danger">Sortir</a>
                </div>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-info py-2">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    </div>

    <main class="container" id="page">
        {% block main %} {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
