{% extends 'base.html' %}

{% block main %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-lg border-0" style="border-radius: 20px;">
            <div class="card-header bg-primary text-white text-center py-4" style="border-radius: 20px 20px 0 0;">
                <h3 class="fw-bold mb-0"> ENREGISTRER UNE VENTE</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Sélectionner le Produit</label>
                        <select name="produit" class="form-select form-select-lg" required>
                            <option value="" selected disabled>--- Quel article a été vendu ? ---</option>
                            {% for p in produits %}
                                <option value="{{ p.id_prod }}">{{ p.nom_prod }} ({{ p.prix }} FCFA/unité)</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Vendeur</label>
                        <select name="vendeur" class="form-select" required>
                            {% for v in vendeurs %}
                                <option value="{{ v.id_vendeur }}">{{ v.prenom_vendeur }} {{ v.nom_vendeur }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Quantité vendue</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">x</span>
                            <input type="number" name="quantite" class="form-control form-control-lg" value="1" min="1" required>
                        </div>
                        <small class="text-muted">Le prix total sera calculé automatiquement ! ✨</small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg fw-bold shadow">
                            VALIDER LA VENTE 
                        </button>
                        <a href="{% url 'vente_list' %}" class="btn btn-light border fw-bold">
                            RETOUR À L'HISTORIQUE
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Petit effet de focus pour faire pro */
    .form-control:focus, .form-select:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
    }
</style>
{% endblock %}
