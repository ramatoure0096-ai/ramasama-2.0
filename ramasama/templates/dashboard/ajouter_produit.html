{% extends 'base.html' %}
{% block main %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow p-4 border-0">
            <h3 class="fw-bold mb-4 text-center">NOUVEAU PRODUIT</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Nom du produit</label>
                    <input type="text" name="nom" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Type (Saisie libre : ex: Alcool, Snack, etc.)</label>
                    <input type="text" name="type" class="form-control" placeholder="Tapes le type ici..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Prix (FCFA)</label>
                    <input type="number" name="prix" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-3 fw-bold">ENREGISTRER </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
