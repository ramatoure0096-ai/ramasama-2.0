{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="card-title">Confirmation d'Exportation</h3>
                    <p class="text-muted">Sélectionnez le format de données pour le rapport de ventes.</p>
                    <hr>
                    <div class="d-grid gap-3">
                        <a href="{% url 'export-pdf' %}" class="btn btn-danger btn-lg">
                            <i class="bi bi-file-earmark-pdf"></i> Exporter en PDF
                        </a>
                        <a href="{% url 'export-csv' %}" class="btn btn-success btn-lg">
                            <i class="bi bi-file-earmark-spreadsheet"></i> Exporter en CSV (Excel)
                        </a>
                        <a href="{% url 'dashboard' %}" class="btn btn-light">Retour au tableau de bord</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
